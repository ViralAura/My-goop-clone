<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOOP Admin – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gp':      '#1a1a1a',
            'gp-mid':  '#8c8c8c',
            'gp-lt':   '#f5f5f5',
            'gp-cream':'#faf8f5',
            'gp-line': '#e5e5e5',
            'gp-red':  '#dc2626',
            'gp-green':'#16a34a',
          },
          fontFamily: {
            serif: ['"Times New Roman"','Georgia','serif'],
            sans:  ['Helvetica','Arial','sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    @keyframes fu {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu { animation: fu .6s ease-out both; }
    .goop-input {
      width: 100%; padding: 12px 14px;
      border: 1px solid #e5e5e5; background: white;
      font-size: 13px; font-family: Helvetica, Arial, sans-serif;
      outline: none; transition: border-color .2s;
    }
    .goop-input:focus { border-color: #1a1a1a; }
    .goop-input.error { border-color: #dc2626; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>
<body class="bg-gp-cream font-sans min-h-screen flex flex-col items-center justify-center px-4">

  <!-- ===== ADMIN LOGIN CARD ===== -->
  <div class="w-full max-w-md fu">

    <!-- Logo + Admin label -->
    <div class="text-center mb-8">
      <a href="index.html" class="text-[26px] tracking-[.4em] uppercase font-serif font-bold">goop</a>
      <div class="flex items-center justify-center gap-2 mt-2">
        <span class="w-6 h-px bg-gp-mid"></span>
        <p class="text-[11px] text-gp-mid tracking-[.25em] uppercase">Merchant Portal</p>
        <span class="w-6 h-px bg-gp-mid"></span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white border border-gp-line shadow-sm">
      <div class="px-8 pt-8 pb-2 border-b border-gp-line">
        <h1 class="text-xl font-serif mb-1">Sign In to Admin</h1>
        <p class="text-[12px] text-gp-mid">Manage your store, products, and orders.</p>
      </div>

      <div class="p-8">

        <!-- API Error Banner -->
        <div id="api-error" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-700 text-[12px] leading-relaxed flex items-start gap-2">
          <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
          <span id="api-error-text">Invalid email or password.</span>
        </div>

        <!-- Success Banner -->
        <div id="api-success" class="hidden mb-6 p-4 bg-green-50 border border-green-200 text-green-800 text-[12px]">
          <strong>Welcome back!</strong> Redirecting to your dashboard…
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form" novalidate>

          <!-- Email -->
          <div class="mb-5">
            <label class="block text-[11px] tracking-[.15em] uppercase mb-2" for="email">
              Email Address
            </label>
            <input
              class="goop-input"
              type="email"
              id="email"
              placeholder="merchant@example.com"
              autocomplete="email"
            />
            <p class="hidden mt-1.5 text-[11px] text-gp-red" id="email-err">
              Please enter a valid email address.
            </p>
          </div>

          <!-- Password -->
          <div class="mb-8">
            <label class="block text-[11px] tracking-[.15em] uppercase mb-2" for="password">
              Password
            </label>
            <div class="relative">
              <input
                class="goop-input pr-10"
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <!-- Show/hide password toggle -->
              <button
                type="button"
                onclick="togglePw()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gp-mid hover:text-gp transition-colors"
                aria-label="Toggle password"
              >
                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </button>
            </div>
            <p class="hidden mt-1.5 text-[11px] text-gp-red" id="password-err">
              Password is required.
            </p>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="submit-btn"
            class="w-full py-4 bg-gp text-white text-[11px] tracking-[.25em] uppercase hover:bg-gp/85 transition-colors flex items-center justify-center gap-2"
          >
            <span id="btn-text">Sign In</span>
            <!-- Loading spinner -->
            <svg id="spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
            </svg>
          </button>

        </form>

        <!-- Register link -->
        <p class="text-center text-[12px] text-gp-mid mt-6">
          Don't have a merchant account?
          <a href="admin-register.html" class="text-gp hover:underline underline-offset-2 ml-1">
            Create one
          </a>
        </p>

      </div>
    </div>

    <!-- Back to store -->
    <p class="text-center text-[11px] text-gp-mid mt-6">
      <a href="index.html" class="hover:text-gp transition-colors flex items-center justify-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        Back to storefront
      </a>
    </p>

  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
  /* ─────────────────────────────────────────────────────────
     API CONFIG
     Base URL for all API calls. Change this one line if the
     server URL ever changes and everything updates.
     ───────────────────────────────────────────────────────── */
  const API = 'http://ecommerce.reworkstaging.name.ng/v2';

  /* ─────────────────────────────────────────────────────────
     ADMIN AUTH GUARD
     If a merchant is already logged in (token in localStorage),
     skip the login page and go straight to dashboard.
     ───────────────────────────────────────────────────────── */
  const existingMerchant = localStorage.getItem('goopMerchant');
  if (existingMerchant) {
    window.location.href = 'admin-dashboard.html';
  }

  /* ─────────────────────────────────────────────────────────
     PASSWORD VISIBILITY TOGGLE
     ───────────────────────────────────────────────────────── */
  function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
      ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>`;
  }

  /* ─────────────────────────────────────────────────────────
     FORM VALIDATION HELPERS
     ───────────────────────────────────────────────────────── */
  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

  function showErr(inputId, errId) {
    document.getElementById(inputId).classList.add('error');
    document.getElementById(errId).classList.remove('hidden');
  }
  function hideErr(inputId, errId) {
    document.getElementById(inputId).classList.remove('error');
    document.getElementById(errId).classList.add('hidden');
  }
  function clearErrors() {
    hideErr('email', 'email-err');
    hideErr('password', 'password-err');
    document.getElementById('api-error').classList.add('hidden');
  }

  /* ─────────────────────────────────────────────────────────
     LOADING STATE HELPERS
     ───────────────────────────────────────────────────────── */
  function setLoading(on) {
    const btn     = document.getElementById('submit-btn');
    const text    = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    btn.disabled  = on;
    text.textContent = on ? 'Signing in…' : 'Sign In';
    spinner.classList.toggle('hidden', !on);
  }

  /* ─────────────────────────────────────────────────────────
     LOGIN FORM SUBMIT
     Calls POST /merchants/login with email + password.
     On success: saves merchant data to localStorage and
     redirects to admin-dashboard.html.
     On failure: shows the API error message.
     ───────────────────────────────────────────────────────── */
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid      = true;

    // Client-side validation
    if (!isValidEmail(email)) { showErr('email', 'email-err');       valid = false; }
    if (!password)             { showErr('password', 'password-err'); valid = false; }
    if (!valid) {
      document.getElementById('login-form').classList.add('shake');
      setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 400);
      return;
    }

    setLoading(true);

    try {
      /* ── REAL API CALL ──────────────────────────────────────
         POST /merchants/login
         Sends email and password to the server.
         Server returns merchant data including merchant_id.
         ────────────────────────────────────────────────────── */
      const res  = await fetch(`${API}/merchants/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        // Server returned an error (wrong credentials etc)
        throw new Error(data.message || 'Invalid email or password.');
      }

      /* ── SUCCESS ────────────────────────────────────────────
         Save the full merchant object to localStorage.
         Every other admin page reads from this to get
         the merchant_id for their API calls.
         ────────────────────────────────────────────────────── */
      localStorage.setItem('goopMerchant', JSON.stringify(data));

      // Show success message
      document.getElementById('api-success').classList.remove('hidden');
      document.getElementById('btn-text').textContent = 'Success ✓';

      // Redirect to dashboard
      setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1500);

    } catch (err) {
      // Show the error from the server
      document.getElementById('api-error-text').textContent = err.message;
      document.getElementById('api-error').classList.remove('hidden');
      setLoading(false);

      document.getElementById('login-form').classList.add('shake');
      setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 400);
    }
  });
  </script>
</body>
</html>
